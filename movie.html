<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="movie.css">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- HERO -->
<section class="hero" id="hero">

    <div class="movie-container">

        <!-- POSTER -->
        <div class="poster">
            <img id="poster" src="" alt="Movie Poster">
        </div>

        <!-- DETAILS -->
        <div class="details">

            <div id="age">PG</div>

            <h1 id="title"></h1>

            <p class="genre" id="genre"></p>

            <p class="info" id="time"></p>

            <h3>Story:</h3>
            <p class="story" id="story"></p>

            <h3>Cast & Crew:</h3>
            <p id="cast"></p>
            <br></br>

            <button class="trailer-btn" id="trailerBtn">▶ Play Trailer</button>

        </div>

    </div>

</section>

<!-- DATE SELECTOR -->
<section class="booking">

    <!-- DATE SELECTOR -->
    <div class="dates" id="date-container"></div>

    <!-- CINEMA CARD -->
    <div class="cinema-card">

        <h2>📍 CineX - DISTRICT 5</h2>

        <!-- EXPERIENCE TABS -->
        <div class="experience-tabs">
<button class="tab exp-btn active" onclick="selectExp(this)">STANDARD&DELUXE</button>
<button class="tab exp-btn" onclick="selectExp(this)">PREMIERE</button>
        </div>

        <!-- SHOWTIMES -->
        <div class="times">
            <button class="time" onclick="selectTime(this)">01:00 PM</button>
<button class="time" onclick="selectTime(this)">03:00 PM</button>
<button class="time" onclick="selectTime(this)">07:00 PM</button>
<button class="time" onclick="selectTime(this)">10:00 PM</button>
        </div>

    </div>

</section>

<!-- VIDEO MODAL -->
<div id="videoModal" class="modal" style="display:none;">
    <span class="close-btn">&times;</span>

    <div class="modal-content">
        <div class="video-container">
            <iframe id="videoPlayer"
                width="560"
                height="315"
                src=""
                frameborder="0"
                allow="autoplay; encrypted-media"
                allowfullscreen>
            </iframe>
        </div>
    </div>
</div>

<h2 style="padding:40px">OTHER MOVIES YOU MAY ENJOY</h2>
<div id="otherMovies"></div>

<script src="movie.js"></script>



</body>
</html>
