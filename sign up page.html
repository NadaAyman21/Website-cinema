<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>

  
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="sign up page.css">
</head>
<body>

<div class="container">
    <h2><i class="fa-solid fa-clapperboard"></i> Create your account</h2>

    <div class="row">
        <div class="input-box">
            <i class="fa fa-user"></i>
            <input type="text" placeholder="First Name">
        </div>

        <div class="input-box">
            <i class="fa fa-user"></i>
            <input type="text" placeholder="Last Name">
        </div>
    </div>

    <div class="input-box">
        <i class="fa fa-envelope"></i>
        <input type="email" placeholder="Enter your email">
    </div>

    <div class="input-box password-box">
        <i class="fa fa-lock"></i>
        <input type="password" id="password" placeholder="Enter your password">
        <i class="fa fa-eye toggle" onclick="togglePassword()"></i>
    </div>
    <div class="input-box password-box">
           <input type="confirm password" placeholder="Confirm your password"> 
    </div>

    <div class="gender">
        <p>Gender:</p>
        <label><input type="radio" name="gender"> Male</label>
        <label><input type="radio" name="gender"> Female</label>
    </div>

    <div class="input-box">
        <i class="fa fa-phone"></i>
        <input type="tel" placeholder="Phone Number">
    </div>

    <div class="input-box">
        <i class="fa fa-calendar"></i>
        <input type="date">
    </div>
<a href="https://accounts.google.com">
    <i class="fa-brands fa-google"></i>
</a>

<a href="https://account.apple.com ">
    <i class="fa-brands fa-apple"></i>
</a>

    <div class="checkbox">
        <label>
            <input type="checkbox"> I accept the terms and conditions
        </label>
    </div>


    <button class="btn">Sign Up</button>

    <div class="footer">
        <p class="footer" style="color: white;">
    Already have an account? <a href="login.html"><u>Login</u></a>
</p>
    </div>
</div>

<script>
function togglePassword() {
    let pass = document.getElementById("password");
    if (pass.type === "password") {
        pass.type = "text";
    } else {
        pass.type = "password";
    }
    
}
function confirmpassword(){

 let pass = document.getElementById("confirm password");
    if (pass.type === "confrim password") {
        pass.type = "text";
    } else {
        pass.type = "confirm password";
    }
  }
</script>

</body>
</html>
