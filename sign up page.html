<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/sign up page.css">
</head>
<body style="background:#111; min-height:100vh; display:flex; justify-content:center; align-items:center;">

    <!-- Standalone version for direct access -->
    <div class="containerS">
        <h2>Create your account</h2>
        <form id="signupForm">
            <div class="row">
                <div class="input-boxS">
                    <i class="fa fa-user"></i>
                    <input type="text" id="firstName" placeholder="First Name">
                <small class="error" id="firstNameError"></small>
                </div>
                <div class="input-boxS">
                    <i class="fa fa-user"></i>
                    <input type="text" id="lastName" placeholder="Last Name">
                <small class="error" id="lastNameError"></small>
                </div>
            </div>

            <div class="input-boxS">
                <i class="fa fa-envelope"></i>
                <input type="email" id="email" placeholder="Enter your email">
            <small class="error" id="emailError"></small>
               </div>
            <div class="input-boxS password-box">
                <i class="fa fa-lock"></i>
                <input type="password" id="password" placeholder="Enter your password">
                <i class="fa fa-eye toggle" onclick="togglePassword('password', this)"></i>
            <small class="error" id="passwordError"></small>
               </div>
            <div class="input-boxS password-box">
                <input type="password" id="confirmPassword" placeholder="Confirm your password">
                <i class="fa fa-eye toggle" onclick="togglePassword('confirmPassword', this)"></i>
            
            <small class="error" id="confirmPasswordError"></small>
               </div>
            <div class="genderS">
                <p>Gender:</p>
                <label><input type="radio" name="gender"> Male</label>
                <label><input type="radio" name="gender"> Female</label>
            <small class="error" id="genderError"></small>
            </div>
            <div class="input-boxS">
                <i class="fa fa-phone"></i>
                <input type="tel" id="tel" placeholder="Phone Number">
            <small class="error" id="phoneError"></small>
             </div>
            <div class="input-boxS">
                <i class="fa fa-calendar"></i>
                <input type="date" id="dob">
            
            <small class="error" id="dobError"></small>
            </div>
           <div class="social-icons-wrap">
            <a href="https://accounts.google.com"><i class="fa-brands fa-google"></i></a>
            <a href="https://account.apple.com"><i class="fa-brands fa-apple"></i></a>
           </div>
            <div class="checkboxS">
                <label><input type="checkbox" id="terms"> I accept the terms and conditions</label>
            
            <small class="error" id="termsError"></small>
              </div>

            <button class="btn" type="submit">Sign Up</button>
        </form>
        <div class="footerS">
            <p>Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>

    <div id="customAlert" class="custom-modal">
        <div class="modal-content black-theme">
            <h3 id="alertTitle">CineX.com says</h3>
            <p id="alertMessage"></p>
            <button onclick="closeAlert()">OK</button>
        </div>
    </div>

    <script src="java/sign up page.js"></script>
</body>
</html>
