<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="responsive.css">
    <link rel="stylesheet" href="css/sign up page.css">
</head>
<body>

<div class="container">
    <h2><i class="fa-solid fa-clapperboard"></i> Create your account</h2>
<form id="signupForm">
    <div class="row">
        <div class="input-box">
            <i class="fa fa-user"></i>
            <input type="text" id="firstName" placeholder="First Name">
        </div>
        <small class="error" id="firstNameError"></small>

        <div class="input-box">
            <i class="fa fa-user"></i>
            <input type="text" id="lastName" placeholder="Last Name">
        </div>
        <small class="error" id="lastNameError"></small>
    </div>

    <div class="input-box">
        <i class="fa fa-envelope"></i>
        <input type="email" id="email" placeholder="Enter your email">
    </div>
    <small class="error" id="emailError"></small>

   <div class="input-box password-box">
    <i class="fa fa-lock"></i>
    <input type="password" id="password" placeholder="Enter your password">
    <i class="fa fa-eye toggle" onclick="togglePassword('password', this)"></i>
</div>
<small class="error" id="passwordError"></small>

<div class="input-box password-box">
    <input type="password" id="confirmPassword" placeholder="Confirm your password"> 
    <i class="fa fa-eye toggle" onclick="togglePassword('confirmPassword', this)"></i>
</div>
<small class="error" id="confirmPasswordError"></small>

    <div class="gender">
        <p>Gender:</p>
        <label><input type="radio" name="gender"> Male</label>
        <label><input type="radio" name="gender"> Female</label>
    </div>
    <small class="error" id="genderError"></small>

    <div class="input-box">
        <i class="fa fa-phone"></i>
        <input type="tel" id="tel" placeholder="Phone Number">
    </div>
    <small class="error" id="phoneError"></small>

    <div class="input-box">
        <i class="fa fa-calendar"></i>
        <input type="date" id="dob">
    </div>
    <small class="error" id="dobError"></small>
<a href="https://accounts.google.com">
    <i class="fa-brands fa-google"></i>
</a>

<a href="https://account.apple.com ">
    <i class="fa-brands fa-apple"></i>
</a>

    <div class="checkbox">
        <label>
            <input type="checkbox" id="terms"> I accept the terms and conditions
        </label>
    </div>
    <small class="error" id="termsError"></small>


    <button class="btn">Sign Up</button>
</form>
    <div class="footer">
        <p class="footer" style="color: black">
    Already have an account? <a href="login.html"><u>Login</u></a>
</p>
    </div>
</div>

  <!--custom alret-->
<div id="customAlert" class="custom-modal">
        <div class="modal-content black-theme">
            <h3 id="alertTitle">CineX.com says</h3>
            <p id="alertMessage"></p>
            <button onclick="closeAlert()">OK</button>
        </div>
    </div>
<script src="java/sign up page.js"></script>

</body>
</html>
