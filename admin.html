<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="admin.css">

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<h2>🎬 Admin Dashboard</h2>
<button class="logout">Logout</button>
</div>


<div class="container">

<!-- FORM -->
<form id="movieForm">
<h3><i class="fa-solid fa-film"></i> Add / Edit Movie</h3>

<input type="text" id="title" placeholder="Movie Title" required>
<input type="text" id="genre" placeholder="Genre" required>
<input type="text" id="time" placeholder="Run Time (2h 30m)" required>
<input type="text" id="image" placeholder="Image URL" required>
<input type="text" id="trailer" placeholder="YouTube Embed Link" required>
<textarea id="story" placeholder="Story"></textarea>
<input type="text" id="cast" placeholder="Cast">
<input type="text" id="age" placeholder="Age Rating (e.g. +12)" required>

<button type="submit">Save Movie</button>

</form>


<!-- MOVIES -->
<div class="movies" id="moviesList"></div>

</div>

<script src="admin.js"> </script>
</body>
</html>
