<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineBook.com</title>
  <link rel="stylesheet" href="styleSeats.css">
</head>
<body class="vip-body">

  <div class="cinema-wrapper">
    <h2 class="main-title">VIP EXPERIENCE</h2>

    <!-- Legend -->
    <div class="legend">
      <div class="legend-item"><div class="circle vip"></div><span>Premiere</span></div>
      <div class="legend-item"><div class="circle occupied"></div><span>Occupied</span></div>
      <div class="legend-item"><div class="circle selected"></div><span>Selected</span></div>
      <div class="legend-item"><div class="circle hold"></div><span>Hold</span></div>
    </div>

    <!-- Screen -->
    <div class="screen-container">
      <div class="screen-curve"></div>
      <p class="screen-label">S C R E E N</p>
    </div>

    <!-- VIP Seating Map -->
    <div class="seating-map">

      <!-- Row A -->
      <div class="row">
        <div class="row-id">A</div>
        <div class="seat-block">
          <div class="seat vip">1</div>
          <div class="seat vip">2</div>
          <div class="seat vip">3</div>
          <div class="seat vip">4</div>
          <div class="seat vip">5</div>
          <div class="seat vip">6</div>
        </div>
        <div class="row-id">A</div>
      </div>

      <!-- Row B -->
      <div class="row">
        <div class="row-id">B</div>
        <div class="seat-block">
          <div class="seat vip">1</div>
          <div class="seat vip">2</div>
          <div class="seat vip">3</div>
          <div class="seat vip">4</div>
          <div class="seat vip">5</div>
          <div class="seat vip">6</div>
        </div>
        <div class="row-id">B</div>
      </div>

      <!-- Row C -->
      <div class="row">
        <div class="row-id">C</div>
        <div class="seat-block">
          <div class="seat vip">1</div>
          <div class="seat vip">2</div>
          <div class="seat vip">3</div>
          <div class="seat vip">4</div>
          <div class="seat vip">5</div>
          <div class="seat vip">6</div>
        </div>
        <div class="row-id">C</div>
      </div>

      <!-- Row D -->
      <div class="row">
        <div class="row-id">D</div>
        <div class="seat-block">
          <div class="seat vip">1</div>
          <div class="seat vip">2</div>
          <div class="seat vip">3</div>
          <div class="seat vip">4</div>
          <div class="seat vip">5</div>
          <div class="seat vip">6</div>
        </div>
        <div class="row-id">D</div>
      </div>

      <!-- Row E -->
      <div class="row">
        <div class="row-id">E</div>
        <div class="seat-block">
          <div class="seat vip">1</div>
          <div class="seat vip">2</div>
          <div class="seat vip">3</div>
          <div class="seat vip">4</div>
          <div class="seat vip">5</div>
          <div class="seat vip">6</div>
        </div>
        <div class="row-id">E</div>
      </div>

      <!-- Row F -->
      <div class="row">
        <div class="row-id">F</div>
        <div class="seat-block">
          <div class="seat vip">1</div>
          <div class="seat vip">2</div>
          <div class="seat vip">3</div>
          <div class="seat vip">4</div>
          <div class="seat vip">5</div>
          <div class="seat vip">6</div>
        </div>
        <div class="row-id">F</div>
      </div>

    </div>
  </div>

  <!-- Checkout Box -->
  <div class="checkout-box">
      <button class="checkout-btn">→ Checkout</button>
    <p class="price">0.00 EGP</p>
  </div>
<script src="javaSEATS.js"></script>
  
</body>
</html>
